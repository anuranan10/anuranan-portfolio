          - text: This past weekend, I had the opportunity to present a research poster on our project, “Turbine Aerodynamics and Performance Characterization,” at the Florida Undergraduate Research Conference (FURC) hosted at the
          - link "University of North Florida" [ref=e86] [cursor=pointer]:
            - /url: https://www.linkedin.com/school/university-of-north-florida/?trk=public_post-text
          - text: . It was a great experience representing
          - link "Embry-Riddle Aeronautical University" [ref=e87] [cursor=pointer]:
            - /url: https://www.linkedin.com/school/embry-riddle-aeronautical-university/?trk=public_post-text
          - text: and sharing our work with students and researchers from across the state. I’m grateful for the opportunity to work alongside my teammates
          - link "Kalkamanali Satvaldy" [ref=e88] [cursor=pointer]:
            - /url: https://www.linkedin.com/in/kalkamanali-satvaldy?trk=public_post-text
          - text: and
          - link "Vincent Shi" [ref=e89] [cursor=pointer]:
            - /url: https://www.linkedin.com/in/shivincent25?trk=public_post-text
          - text: on this project. A big thank you as well to the
          - link "ERAU Office of Undergraduate Research" [ref=e90] [cursor=pointer]:
            - /url: https://www.linkedin.com/company/erau-office-of-undergraduate-research?trk=public_post-text
          - text: for supporting undergraduate research and helping make opportunities like this possible.
