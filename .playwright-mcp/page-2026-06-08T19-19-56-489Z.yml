      - paragraph [ref=e47]: "The ERAU blowdown tunnel stores compressed air, releases it through a pressure regulator into a convergent-divergent nozzle, and exhausts through a silencer. Thirteen static taps sampled the floor pressure distribution during steady-state operation (identified from the time history as rows 1,653–2,103). Total pressure was back-calculated at the throat assuming Mach 1 flow, and the nozzle pressure ratio was compared against the critical value to confirm shock presence:"
