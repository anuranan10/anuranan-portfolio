  - generic [ref=e74]:
    - generic [ref=e75]:
      - heading "Key Results" [level=2] [ref=e76]
      - list [ref=e77]:
        - listitem [ref=e78]:
          - text: Schlieren images confirmed a
          - strong [ref=e79]: clear normal shock between tap positions 9.5 and 10.5 inches
          - text: in the diverging section — exactly where static pressure data showed an abrupt pressure rise.
        - listitem [ref=e80]:
          - strong [ref=e81]: NPR = 3.932
          - text: — exceeding the critical NPR, confirming the flow was choked at the throat and a shock existed inside the nozzle.
        - listitem [ref=e82]:
          - strong [ref=e83]: Shock strength S = 1.614
          - text: — a 61.4% pressure jump across the shock, classifying it as a moderately strong normal shock.
        - listitem [ref=e84]:
          - strong [ref=e85]: Mass flow rate = 6.10 lbm/s
          - text: through the 0.765 in² throat, consistent with the measured stagnation conditions from choked-flow theory.
        - listitem [ref=e86]: "The pressure trace showed the textbook normal shock signature: a smooth decrease through the diverging section, a sharp spike at the shock, and recovery to near back pressure downstream."
    - generic [ref=e87]:
