  - generic [ref=e102]:
    - heading "MATLAB Code" [level=2] [ref=e103]
    - paragraph [ref=e104]: Raw pressure data was time-averaged over the steady-state window, augmented with atmospheric pressure, and used to back-calculate total pressure and compute NPR, shock strength, and mass flow rate.
    - code [ref=e106]: "% Steady-state average + atmospheric correction range_ss = tempData(1653:2103, :); dataframe = mean(range_ss) + Patm; % 13 taps (psi) % Back-calculate total pressure from throat (M = 1) P0 = dataframe(2) / (1 + (y-1)/2)^(-y/(y-1)); % NPR and shock strength NPR = P0 / mean(dataframe(11)); % = 3.932 shock = dataframe(10) / dataframe(9); % = 1.614 (S = P_after/P_before) % Choked-flow mass rate (lbm/s) a = sqrt(y * R * T); mdot = Ath * (P0/a) * sqrt(y) * ((2/(y+1))^((y+1)/(2*(y-1)))) * 32.174;"
  - generic [ref=e108]:
    - heading "Valuable Takeaways" [level=2] [ref=e109]
    - list [ref=e110]:
      - listitem [ref=e111]:
        - strong [ref=e112]: Schlieren imaging turns invisible physics into a photograph.
        - text: Seeing a shock wave in an actual image — not just a textbook diagram — makes the density gradient concept tangible. The technique is widely used in supersonic testing, hypersonic wind tunnels, and shock-tube experiments.
      - listitem [ref=e113]:
        - strong [ref=e114]: NPR is the single diagnostic quantity for nozzle flow regime.
        - text: Knowing whether NPR exceeds the critical value tells an engineer immediately whether the throat is choked and a shock is present — essential knowledge for nozzle design in rocket engines and high-speed inlets.
      - listitem [ref=e115]:
        - strong [ref=e116]: Normal shocks are lossy — they create entropy.
        - text: The shock strength of 1.614 represents an irreversible pressure rise that drives designers toward oblique shocks and shock-management systems in real supersonic inlets.
      - listitem [ref=e117]: Gained hands-on experience with a blowdown supersonic facility, interpreted Schlieren photography, and applied compressible flow relations to extract propulsion-relevant parameters from instrumentation data.
