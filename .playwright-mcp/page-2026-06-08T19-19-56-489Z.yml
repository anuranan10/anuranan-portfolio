  - generic [ref=e14]:
    - generic [ref=e15]:
      - heading "Experiment Overview" [level=2] [ref=e16]
      - paragraph [ref=e17]: Shock waves are one of the most dramatic phenomena in compressible flow — a razor-thin region where pressure, temperature, and density jump discontinuously. They appear inside nozzles, around supersonic bodies, and at control surface impingement points. Schlieren imaging makes them visible without touching the flow, an elegant optical technique used in supersonic aircraft testing, ballistic research, and scramjet development. This lab introduced blowdown supersonic wind tunnel operation and applied Schlieren photography to characterize a normal shock inside the nozzle.
      - list [ref=e18]:
        - listitem [ref=e19]: Understand the operating cycle and components of a blowdown supersonic wind tunnel
        - listitem [ref=e20]: Use Schlieren optics to visually locate and characterize a normal shock in the diverging nozzle section
        - listitem [ref=e21]: Compute the nozzle pressure ratio (NPR) and shock strength from 13 static pressure taps
        - listitem [ref=e22]: Determine the choked-flow mass flow rate through the nozzle throat
